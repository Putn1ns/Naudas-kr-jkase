{% extends "base.html" %}

{% block content %}
<h2>Pievienot tēriņu</h2>

<form method="POST">
    <p>
        Summa (€):<br>
        <input type="number" step="0.01" name="summa" required>
    </p>
    <p>
        Kādam nolūkam?:<br>
        <input type="text" name="iemesls" required>
    </p>
    <button type="submit" style="background-color: #1e293b; color: white; border: none; padding: 5px 15px;">Pievienot</button>
</form>

<br>
<h3>Tavu tēriņu saraksts</h3>
<table class="table">
    <tr>
        <th>Summa</th>
        <th>Iemesls</th>
    </tr>
    {% for izdevums in izdevumi %}
    <tr>
        <td style="color: red; font-weight: bold;">- {{ izdevums['summa'] }} €</td>
        <td>{{ izdevums['iemesls'] }}</td>
    </tr>
    {% else %}
    <tr>
        <td colspan="2">Saraksts ir tukšs.</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
